<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alsama – Poll Results</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f9f5f2;
      color: #25232E;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #47535a;
      color: #fff;
      padding: 1.25rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
    }

    .subtitle {
      text-align: center;
      color: #47535a;
      font-size: 0.9rem;
      margin-top: 0.4rem;
      letter-spacing: 0.04em;
    }

    main {
      flex: 1;
      padding: 2.5rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .q-block {
      width: 100%;
      max-width: 680px;
      background: #fff;
      border-radius: 12px;
      padding: 1.75rem 2rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .q-label {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #47535a;
      margin-bottom: 0.4rem;
    }

    .q-text {
      font-size: 1.15rem;
      line-height: 1.45;
      margin-bottom: 1.25rem;
      color: #25232E;
    }

    .total-label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.1rem;
      font-style: italic;
    }

    .tally-row {
      display: grid;
      grid-template-columns: 1fr 200px auto;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
    }

    .tally-label {
      font-size: 0.95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-wrap {
      height: 14px;
      background: #e8e3de;
      border-radius: 7px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #d04c72;
      border-radius: 7px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .tally-count {
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      min-width: 3ch;
      text-align: right;
    }

    @media (max-width: 520px) {
      .tally-row { grid-template-columns: 1fr 90px auto; }
    }
  </style>
</head>
<body>

<header>Alsama</header>

<main id="main">
  <p style="color:#888;font-style:italic;margin-top:1rem;">Loading results…</p>
</main>

<script>
  // ─── CONFIG ─────────────────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://eueqklakdyjyywvrqxge.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1ZXFrbGFrZHlqeXl3dnJxeGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDk2ODksImV4cCI6MjA5NzA4NTY4OX0.CLIaoVPxp1jO7cuRIB1ku7wzVNVr0j2ZCoq83lMz2Jg';
  // ────────────────────────────────────────────────────────────────────────────

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const QUESTIONS = [
    {
      text: 'How excited are you about Alsama going AI-native?',
      options: [
        'Not interested',
        'Could be persuaded',
        'Curious',
        "I'm ready — let's go!",
      ],
    },
    {
      text: 'Which part of going AI-native excites (or scares) you most?',
      options: [
        'The time it could save me',
        "Getting left behind if I don't learn it",
        'What it could do for our students',
        "Honestly, I'm not sure yet",
      ],
    },
    {
      text: 'How would you rate your current AI confidence?',
      options: [
        "I've never used it",
        "I've dabbled but wouldn't call myself confident",
        'I use it regularly',
        'I could teach a workshop tomorrow',
      ],
    },
    {
      text: 'What would help you get on board?',
      options: [
        'A proper training session',
        'Seeing it work at Alsama first',
        'Just give me time to experiment',
        "I'm already on board — what are we waiting for?",
      ],
    },
  ];

  const mainEl = document.getElementById('main');

  // Build DOM for all questions upfront
  function buildBlocks() {
    mainEl.innerHTML = '';
    QUESTIONS.forEach((q, idx) => {
      const block = document.createElement('div');
      block.className = 'q-block';
      block.id = `q-block-${idx}`;

      block.innerHTML = `
        <p class="q-label">Question ${idx + 1} of ${QUESTIONS.length}</p>
        <p class="q-text">${q.text}</p>
        <p class="total-label" id="total-${idx}">— votes</p>
        <div id="tally-${idx}"></div>
      `;
      mainEl.appendChild(block);
    });
  }

  async function renderTally(qIdx) {
    const { data, error } = await db
      .from('responses')
      .select('answer')
      .eq('question_number', qIdx + 1);

    if (error) { console.error(error); return; }

    const opts = QUESTIONS[qIdx].options;
    const counts = {};
    opts.forEach(o => (counts[o] = 0));
    (data || []).forEach(row => {
      if (counts[row.answer] !== undefined) counts[row.answer]++;
    });

    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    const totalEl = document.getElementById(`total-${qIdx}`);
    totalEl.textContent = `${total} vote${total !== 1 ? 's' : ''} so far`;

    const container = document.getElementById(`tally-${qIdx}`);
    container.innerHTML = '';

    opts.forEach(opt => {
      const count = counts[opt] || 0;
      const pct   = total > 0 ? (count / total) * 100 : 0;

      const row = document.createElement('div');
      row.className = 'tally-row';
      row.innerHTML = `
        <span class="tally-label" title="${opt}">${opt}</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="tally-count">${count}</span>
      `;
      container.appendChild(row);
    });
  }

  async function init() {
    buildBlocks();

    // Load all tallies in parallel
    await Promise.all(QUESTIONS.map((_, i) => renderTally(i)));

    // Subscribe to realtime inserts for each question
    QUESTIONS.forEach((_, idx) => {
      db.channel(`results-q${idx + 1}`)
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'responses', filter: `question_number=eq.${idx + 1}` },
          () => renderTally(idx)
        )
        .subscribe();
    });
  }

  init();
</script>
</body>
</html>
